<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styl1.css">
</head>
<body>
    <div class="cont">
        <div class=" box_row">
            <header>
                Zapanuj nad swoimi finansami
            </header>
            <span ><svg viewBox="0 0 24 24" width="100" height="100" fill="none"  onclick="opt()" id="opt_go">
  <path d="M4 6H15M4 12H15M4 18H15" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg></span>
        </div>
        <div class="box_col">

        </div>
    </div>
    <div id="opt">
        <div style="display: flex; flex-direction: column;">
            <span onclick="log()">Zaloguj</span>
            <span onclick="rej()">Zarejestruj</span>
            <span></span>
        </div>

        <img src="rysunek-1.svg" width="40" alt="" onclick="opt()" >
    </div>
    <form id="logForm">
        <div id="log">
            <span>Zaloguj się</span>
            <span><input type="email" id="email" placeholder="podaj e mail"required></span>
            <span><input type="password" id="haslo_vis_log" placeholder="podaj hasło" required></span>
            <span><label><input type="checkbox" onclick="pokazHaslo_log()" >Pokaż hasło</label></span>
            <span><button type="submit">Zaloguj się</button></span>
            <span style="font-size: 20px;" onclick="rej()" class="cpoint">Nie masz konta? Zarejsetruj się</span>
        </div>
    </form>
    <form id="rejForm">
        <div id="rej">
            <span>Zarejestruj się</span>
            <span><input type="text" placeholder="Imię" id="imie" required></span>
            <span><input type="text" placeholder="Nazwisko" id="nazwisko" required></span>
            <span><input type="email"placeholder="e-mail" id="mail"required></span>
            <span><input type="password" placeholder="Hasło" id="haslo_vis_rej_1"required></span>
            <span><label><input type="checkbox" onclick="pokazHaslo_rej_1()">Pokaż hasło</label></span>
            <span><input type="password" placeholder="Powtórz hasło" id="haslo_vis_rej_2" required></span>
            <span><label><input type="checkbox" onclick="pokazHaslo_rej_2()">Pokaż hasło</label></span>
            <span><button type="submit" >Zarejestruj się</button></span>
            <span style="font-size: 20px;" onclick="log()" class="cpoint">Masz już konto? Zaloguj się</span>
        </div>
    </form>
</body>
<script>
    let opt_vis = 0;
    let log_vis = 0;
    let rej_vis = 0;
    function opt(){
        if (opt_vis==0){
            document.getElementById("opt").style.right="0px";
            document.getElementById("opt_go").style.visibility="hidden"
            opt_vis=1;
        }
        else{
            document.getElementById("opt").style.right="-300px";
            document.getElementById("opt_go").style.visibility="visible"
            document.getElementById("log").style.visibility = "hidden";
            document.getElementById("rej").style.visibility = "hidden";
            rej_vis = 0;
            log_vis = 0;
            opt_vis=0;
        }
    }
    function log() {

        
        document.getElementById("rej").style.visibility = "hidden";
        rej_vis = 0;

        if (log_vis == 0) {
            document.getElementById("log").style.visibility = "visible";
            log_vis = 1;
        } else {
            document.getElementById("log").style.visibility = "hidden";
            log_vis = 0;
        }
    }
    
    function rej() {

        
        document.getElementById("log").style.visibility = "hidden";
        log_vis = 0;

        if (rej_vis == 0) {
            document.getElementById("rej").style.visibility = "visible";
            rej_vis = 1;
        } else {
            document.getElementById("rej").style.visibility = "hidden";
            rej_vis = 0;
        }
    }
        function pokazHaslo_log() {
        const haslo = document.getElementById("haslo_vis_log");

        if (haslo.type === "password") {
            haslo.type = "text";
        } else {
            haslo.type = "password";
        }
    }
    function pokazHaslo_rej_1() {
        const haslo = document.getElementById("haslo_vis_rej_1");

        if (haslo.type === "password") {
            haslo.type = "text";
        } else {
            haslo.type = "password";
        }
    }
    function pokazHaslo_rej_2() {
        const haslo = document.getElementById("haslo_vis_rej_2");

        if (haslo.type === "password") {
            haslo.type = "text";
        } else {
            haslo.type = "password";
        }
    }
    async function go_rej(event){
    
    alert("dziala")
    
    event.preventDefault();

    let imie = document.getElementById("imie").value;
    let nazwisko = document.getElementById("nazwisko").value;
    let email = document.getElementById("mail").value;
    let h1 = document.getElementById("haslo_vis_rej_1").value;
    let h2 = document.getElementById("haslo_vis_rej_2").value;

    if(h1 != h2){
        alert("Hasła muszą być takie same");
        return;
    }

    if(!sprawdzHaslo(h1)){
        return;
    }

    const odpowiedz = await fetch("/register",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            imie,
            nazwisko,
            email,
            haslo:h1
        })
    });

    const wynik = await odpowiedz.json();

    if (odpowiedz.ok) {
        alert(wynik.message);
    } else {
        alert("Błąd: " + wynik.message);
    }
}
    function sprawdzHaslo(haslo) {

    if (haslo.length < 8) {
        alert("Hasło musi mieć co najmniej 8 znaków.");
        return false;
    }

    if (!/[A-Z]/.test(haslo)) {
        alert("Hasło musi zawierać dużą literę.");
        return false;
    }

    if (!/[a-z]/.test(haslo)) {
        alert("Hasło musi zawierać małą literę.");
        return false;
    }

    if (!/[0-9]/.test(haslo)) {
        alert("Hasło musi zawierać cyfrę.");
        return false;
    }

    if (!/[!@#$%^&*(),.?":{}|<>]/.test(haslo)) {
        alert("Hasło musi zawierać znak specjalny.");
        return false;
    }

    return true;
}
document.getElementById("rejForm").addEventListener("submit", go_rej);
</script>
</html>
