<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            background-color: #a3daa6;
            font-size:20px;
        }
        .cont{
            border: 7px solid rgba(46, 46, 46, 0.37);
            border-radius: 10px;
            width: 100%;
            height: 97vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-wrap: wrap;
            box-sizing: border-box;
        }
        header{
            display: flex;
            margin: 0 auto;
            border: 7px solid rgba(46, 46, 46, 0.37);
            border-radius: 30px;
            width: auto;
            height: auto;
            padding: 10px;
            margin-top: 15px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #005300,#008a00, #005300);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 60px;
            font-weight: bold;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
         .box_col{   
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
        }
        .box_row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .kont span{
            position: absolute;
            visibility: visible;
        }
        .box_row span {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        #opt{
            position: fixed;
            top: 0;
            right: -300px;      
            width: 300px;
            top: 14px;
            background: rgba(37, 129, 0, 0.356);
            
            transition: right 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border: 1px solid rgb(0, 158, 0);
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
            user-select: none;
        }
        #opt img:hover{
            cursor: pointer;
        }
        #opt_go:hover{
            cursor: pointer;
        }
        #log{
            position: fixed;
            visibility: hidden;
            width: 25%;
            height: auto;
            padding: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            display: flex;
            justify-content: center;  
            align-items: center;      
            border-radius: 10px;
            flex-direction: column;
            
            background: rgb(94, 167, 68);
            text-align: center;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #log input{
            font-size: 20px;
            padding: 5px;
            border-radius: 10px;
            background-color: #c2ffaf;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #log button{
            font-size: 20px;
            padding: 5px;
            border-radius: 10px;
            background-color: #c2ffaf;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #log input::placeholder{
            color: black;
        }
        #rej{
            position: fixed;
            visibility: hidden;
            width: 25%;
            height: auto;
            padding: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            display: flex;
            justify-content: center;  
            align-items: center;      
            border-radius: 10px;
            flex-direction: column;
            
            background: rgb(94, 167, 68);
            text-align: center;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #rej input{
            font-size: 20px;
            padding: 5px;
            border-radius: 10px;
            background-color: #c2ffaf;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #rej button{
            font-size: 20px;
            padding: 5px;
            border-radius: 10px;
            background-color: #c2ffaf;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #rej input::placeholder{
            color: black;
        }
        .cpoint:hover{
            cursor: pointer;
        }
    </style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cont">
        <div class=" box_row">
            <header>
                Zapanuj nad swoimi finansami
            </header>
            <span ><svg viewBox="0 0 24 24" width="100" height="100" fill="none"  onclick="opt()" id="opt_go">
  <path d="M4 6H15M4 12H15M4 18H15" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg></span>
        </div>
        <div class="box_col">

        </div>
    </div>
    <div id="opt">
        <div style="display: flex; flex-direction: column;">
            <span onclick="log()">Zaloguj</span>
            <span onclick="rej()">Zarejestruj</span>
            <span></span>
        </div>

        <img src="rysunek-1.svg" width="40" alt="" onclick="opt()" >
    </div>
    <form onsubmit="return go_log()">
        <div id="log">
            <span>Zaloguj się</span>
            <span><input type="email" id="email" placeholder="podaj e mail"required></span>
            <span><input type="password" id="haslo_vis_log" placeholder="podaj hasło" required></span>
            <span><label><input type="checkbox" onclick="pokazHaslo_log()" >Pokaż hasło</label></span>
            <span><button type="submit">Zaloguj się</button></span>
            <span style="font-size: 20px;" onclick="rej()" class="cpoint">Nie masz konta? Zarejsetruj się</span>
        </div>
    </form>
    <form onsubmit="return go_rej()">
        <div id="rej">
            <span>Zarejestruj się</span>
            <span><input type="text" placeholder="Imię"required></span>
            <span><input type="text" placeholder="Nazwisko"required></span>
            <span><input type="email"placeholder="e-mail"required></span>
            <span><input type="password" placeholder="Hasło" id="haslo_vis_rej_1"required></span>
            <span><label><input type="checkbox" onclick="pokazHaslo_rej_1()">Pokaż hasło</label></span>
            <span><input type="password" placeholder="Powtórz hasło" id="haslo_vis_rej_2" required></span>
            <span><label><input type="checkbox" onclick="pokazHaslo_rej_2()">Pokaż hasło</label></span>
            <span><button type="submit" >Zarejestruj się</button></span>
            <span style="font-size: 20px;" onclick="log()" class="cpoint">Masz już konto? Zaloguj się</span>
        </div>
    </form>
</body>
<script>
    let opt_vis = 0;
    let log_vis = 0;
    let rej_vis = 0;
    function opt(){
        if (opt_vis==0){
            document.getElementById("opt").style.right="0px";
            document.getElementById("opt_go").style.visibility="hidden"
            opt_vis=1;
        }
        else{
            document.getElementById("opt").style.right="-300px";
            document.getElementById("opt_go").style.visibility="visible"
            document.getElementById("log").style.visibility = "hidden";
            document.getElementById("rej").style.visibility = "hidden";
            rej_vis = 0;
            log_vis = 0;
            opt_vis=0;
        }
    }
    function log() {

        
        document.getElementById("rej").style.visibility = "hidden";
        rej_vis = 0;

        if (log_vis == 0) {
            document.getElementById("log").style.visibility = "visible";
            log_vis = 1;
        } else {
            document.getElementById("log").style.visibility = "hidden";
            log_vis = 0;
        }
    }
    
    function rej() {

        
        document.getElementById("log").style.visibility = "hidden";
        log_vis = 0;

        if (rej_vis == 0) {
            document.getElementById("rej").style.visibility = "visible";
            rej_vis = 1;
        } else {
            document.getElementById("rej").style.visibility = "hidden";
            rej_vis = 0;
        }
    }
        function pokazHaslo_log() {
        const haslo = document.getElementById("haslo_vis_log");

        if (haslo.type === "password") {
            haslo.type = "text";
        } else {
            haslo.type = "password";
        }
    }
    function pokazHaslo_rej_1() {
        const haslo = document.getElementById("haslo_vis_rej_1");

        if (haslo.type === "password") {
            haslo.type = "text";
        } else {
            haslo.type = "password";
        }
    }
    function pokazHaslo_rej_2() {
        const haslo = document.getElementById("haslo_vis_rej_2");

        if (haslo.type === "password") {
            haslo.type = "text";
        } else {
            haslo.type = "password";
        }
    }
    function go_rej(){
        let h1 = document.getElementById("haslo_vis_rej_1").value;
        let h2 = document.getElementById("haslo_vis_rej_2").value;
        if( h1==h2){
            return sprawdzHaslo(h1)
        }
        else{
            return false;
            alert("hasła muszą być takie same")
        }
    
    
    }
    function sprawdzHaslo(haslo) {

    if (haslo.length < 8) {
        alert("Hasło musi mieć co najmniej 8 znaków.");
        return false;
    }

    if (!/[A-Z]/.test(haslo)) {
        alert("Hasło musi zawierać dużą literę.");
        return false;
    }

    if (!/[a-z]/.test(haslo)) {
        alert("Hasło musi zawierać małą literę.");
        return false;
    }

    if (!/[0-9]/.test(haslo)) {
        alert("Hasło musi zawierać cyfrę.");
        return false;
    }

    if (!/[!@#$%^&*(),.?":{}|<>]/.test(haslo)) {
        alert("Hasło musi zawierać znak specjalny.");
        return false;
    }

    return true;
}
</script>
</html>
