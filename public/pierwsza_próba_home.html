<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            background-color: #a3daa6;
            font-size:20px;
        }
        .cont{
            border: 7px solid rgba(46, 46, 46, 0.37);
            border-radius: 10px;
            width: 100%;
            height: 97vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-wrap: wrap;
            box-sizing: border-box;
        }
        header{
            display: flex;
            margin: 0 auto;
            border: 7px solid rgba(46, 46, 46, 0.37);
            border-radius: 30px;
            width: auto;
            height: auto;
            padding: 10px;
            margin-top: 15px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #005300,#008a00, #005300);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 60px;
            font-weight: bold;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
         .box_col{   
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
        }
        .box_row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .kont span{
            position: absolute;
            visibility: visible;
        }
        .box_row span {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        #opt{
            position: fixed;
            top: 0;
            right: -300px;      
            width: 300px;
            top: 14px;
            background: rgba(37, 129, 0, 0.356);
            
            transition: right 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border: 1px solid rgb(0, 158, 0);
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #opt img:hover{
            cursor: pointer;
        }
        #opt_go:hover{
            cursor: pointer;
        }
        #log{
            position: fixed;
            visibility: hidden;
            width: 25%;
            height: auto;
            padding: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            display: flex;
            justify-content: center;  
            align-items: center;      
            border-radius: 10px;
            flex-direction: column;
            
            background: rgba(37, 129, 0, 0.356);
            text-align: center;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
        #log input{
            font-size: 20px;
            padding: 5px;
            border-radius: 10px;
            background-color: #c2ffaf;
            font-family: "Saira Stencil", sans-serif;
            font-optical-sizing: auto;
        }
    </style>



<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cont">
        <div class=" box_row">
            <header>
                Zapanuj nad swoimi finansami
            </header>
            <span ><svg viewBox="0 0 24 24" width="100" height="100" fill="none"  onclick="opt()" id="opt_go">
  <path d="M4 6H15M4 12H15M4 18H15" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg></span>
        </div>
        <div class="box_col">

        </div>
    </div>
    <div id="opt">
        <div style="display: flex; flex-direction: column;">
            <span onclick="log()">test</span>
            <span onclick="rej()">test</span>
            <span></span>
        </div>

        <img src="rysunek-1.svg" width="40" alt="" onclick="opt()" >
    </div>
    <div id="log">
        <span>Zaloguj się</span>
        <span><input type="email" id="email" placeholder="podaj e mail"></span>
        <span><input type="password" id="haslo" placeholder="podaj hasło"></span>
        <span><label><input type="checkbox" onclick="pokazHaslo()">Pokaż hasło</label></span>
        <span><button>Zaloguj się</button></span>
    </div>
</body>
<script>
    let opt_vis = 0;
    function opt(){
        if (opt_vis==0){
            document.getElementById("opt").style.right="0px";
            document.getElementById("opt_go").style.visibility="hidden"
            opt_vis=1;
        }
        else{
            document.getElementById("opt").style.right="-300px";
            document.getElementById("opt_go").style.visibility="visible"
            opt_vis=0;
        }
    }
    function log(){
        document.getElementById("log").style.visibility="visible"
    }
    function pokazHaslo() {
    const haslo = document.getElementById("haslo");

    if (haslo.type === "password") {
        haslo.type = "text";
    } else {
        haslo.type = "password";
    }
}
</script>
</html>
